<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel and Percentage in CSS</title>
  <link rel="stylesheet" href="PixelPercentage.css">
</head>
<body>
    <h1>CSS Units</h1>
    <p>There are two types of units: </p>
    <ul>
         <li>Absolute Units</li> <!-- fixed units. e.g: px, cm, mm .... -->
         <li>Relative Units</li> <!-- depend on parent element e.g: %, rem, em, vh, vw-->
    </ul>
</body>
